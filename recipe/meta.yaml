{% set python_min = "3.11" %}
{% set version = "0.9.0" %}

package:
  name: lsdb-split
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/h/hats/hats-{{ version }}.tar.gz
    sha256: e723ee4f7a0007a13fa758b0ff5cf3235dea8ff385ad1c471a7bf8da311b01fd
    folder: hats
  - url: https://pypi.org/packages/source/h/hats_import/hats_import-{{ version }}.tar.gz
    sha256: f750627c9f631e4f751ac977314c727b7de6b12c4a1e3857680b283790898238
    folder: hats-import
  - url: https://pypi.org/packages/source/l/lsdb/lsdb-{{ version }}.tar.gz
    sha256: 6e67cc9fcfd1a7eac7dcb2a9accc98c146d45dbe1dfcd1b8c60679dd66b41711
    folder: lsdb

build:
  noarch: python
  number: 0

requirements:
  host:
    - python {{ python_min }}
  run:
    - python {{ python_min }}

outputs:
  - name: hats

    build:
      noarch: python
      script: cd hats && {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      number: 0

    requirements:
      host:
        - python {{ python_min }}
        - setuptools >=62
        - setuptools-scm >=6.2
        - pip
      run:
        - python >={{ python_min }}
        - aiohttp >=3.8.0
        - astropy-base >=6.1.5
        - cdshealpix >=0.8.0
        - fsspec >=2023.10.0
        - human-readable
        - jinja2
        - jproperties >=2.0.0
        - mocpy >=0.19.0
        - nested-pandas >=0.6.7,<0.7.0
        - numba >=0.58
        - numpy >=2,<3
        - pandas >=2.0
        - pyarrow >=14.0.1,!=19.0.0
        - pydantic >=2.0
        - scipy >=1.7.2
        - typing-extensions >=4.3.0
        - universal_pathlib >=0.3.1

    test:
      imports:
        - hats
      commands:
        - pip check
        - cd hats && pytest tests
      requires:
        - pip
        - pytest
        - pytest-mock
        - pytest-timeout
        - python {{ python_min }}
      source_files:
        - hats/tests

  - name: lsdb

    build:
      noarch: python
      script: cd lsdb && {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      number: 0

    requirements:
      host:
        - python {{ python_min }}
        - setuptools >=62
        - setuptools-scm >=6.2
        - pip
      run:
        - python >={{ python_min }}
        - dask >=2025.3.0
        - deprecated
        - hats >=0.8.1,<0.9
        - lsst-sphgeom
        - nested-pandas >=0.6.7,<0.7.0
        - numpy
        - pyarrow
        - scipy >=1.7.2
        - tabulate >=0.7.0
        - universal_pathlib

    test:
      imports:
        - lsdb
      commands:
        - pip check
        - cd lsdb && pytest tests
      requires:
        - pip
        - pytest
        - pytest-mock
        - python {{ python_min }}
      source_files:
        - lsdb/tests

  - name: hats-import

    build:
      noarch: python
      script: cd hats-import && {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      number: 0

    requirements:
      host:
        - python {{ python_min }}
        - setuptools >=62
        - setuptools-scm >=6.2
        - pip
      run:
        - python >={{ python_min }}
        - cloudpickle >=3.0.0
        - dask-core >=2024.3.0,<2025.4.0
        - deprecated
        - distributed
        - hats >=0.8.0,<0.9
        - ipykernel
        - nested-pandas >=0.6.7,<0.7.0
        - numpy >=2.2.0,<3
        - pandas >=2.0
        - tqdm >=4.59.0
        - universal_pathlib

    test:
      imports:
        - hats_import
      commands:
        - pip check
        - cd hats-import && pytest tests --timeout=0
      requires:
        - pip
        - pytest
        - pytest-timeout
        - pytest-mock
        - python {{ python_min }}
      source_files:
        - hats-import/tests
        - hats-import/pyproject.toml

about:
  home: https://github.com/astronomy-commons/lsdb
  summary: 'LSDB, python tool for scalable analysis of large catalogs'
  license: BSD-3-Clause
  license_file: lsdb/LICENSE

extra:
  recipe-maintainers:
    - smcguire-cmu
    - olivialynn
    - gitosaurus
    - dougbrn
    - hombit
    - astronomy-commons/lincc-frameworks
    - camposandro
    - delucchi-cmu
    - drewoldag
    - jeremykubica
    - mjuric
